<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Votação - Resiliência</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --success: #22c55e;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            margin: 1rem;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-weight: 600;
            font-size: 1.75rem;
            margin-top: 0;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
            font-weight: 300;
        }

        .voting-section {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 2rem;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            flex: 1;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.5);
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .placar-box {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--border);
        }

        .placar-box h2 {
            font-size: 1.2rem;
            margin-top: 0;
            margin-bottom: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            font-weight: 400;
            transition: background 0.2s;
        }
        
        li:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .votos-count {
            background: var(--primary);
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        #status-msg {
            margin-top: 1rem;
            font-size: 0.85rem;
            height: 20px;
            transition: color 0.3s;
        }

        .msg-error { color: var(--danger); }
        .msg-success { color: var(--success); }
        
        /* Spinner */
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>
    <div class="container">
        <h1>Batalha de SOs</h1>
        <div class="subtitle">Demonstração de Resiliência e Chaos Engineering</div>
        
        <div class="voting-section">
            <button onclick="votar('Linux')">Linux</button>
            <button onclick="votar('Windows')">Windows</button>
        </div>

        <div class="placar-box">
            <h2>Placar Atual</h2>
            <ul id="placar">
                <div class="loader"></div>
            </ul>
        </div>

        <div id="status-msg"></div>
    </div>

    <script>
        const statusMsg = document.getElementById('status-msg');
        
        function showMessage(msg, isError = false) {
            statusMsg.textContent = msg;
            statusMsg.className = isError ? 'msg-error' : 'msg-success';
            setTimeout(() => { statusMsg.textContent = ''; }, 4000);
        }

        async function carregarPlacar() {
            try {
                const resposta = await fetch('/api/votacao');
                const dados = await resposta.json();
                
                const lista = document.getElementById('placar');
                lista.innerHTML = '';
                
                if(dados.length === 0) {
                    lista.innerHTML = '<li style="justify-content:center; color: #94a3b8">Nenhum voto ainda.</li>';
                }

                dados.forEach(item => {
                    const li = document.createElement('li');
                    
                    // Se for o Fallback do Circuit Breaker, pinta de vermelho
                    if(item.nomeDaOpcao.includes("Indisponível")) {
                        li.style.borderLeft = "4px solid var(--danger)";
                        li.innerHTML = `<span>⚠️ ${item.nomeDaOpcao}</span>`;
                    } else {
                        li.innerHTML = `<span>${item.nomeDaOpcao}</span> <span class="votos-count">${item.quantidadeVotos}</span>`;
                    }
                    lista.appendChild(li);
                });
            } catch (error) {
                console.error("Erro ao carregar:", error);
                document.getElementById('placar').innerHTML = '<li style="color: var(--danger); justify-content:center">Falha crítica de conexão.</li>';
            }
        }

        async function votar(opcao) {
            try {
                const response = await fetch('/api/votacao/' + opcao, { method: 'POST' });
                const text = await response.text();
                
                if (!response.ok) {
                    showMessage(text, true); // HTTP 503 = fallback do Circuit Breaker
                } else {
                    showMessage(`Voto para ${opcao} computado!`, false);
                }
                
                carregarPlacar();
            } catch (error) {
                showMessage("Erro de comunicação com a API", true);
            }
        }

        // Carrega inicial
        carregarPlacar();
        // Auto-refresh a cada 5 segundos para ver atualizações automáticas
        setInterval(carregarPlacar, 5000);
    </script>
</body>
</html>
